<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arxiv Everyday | 登录</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <script defer src="/assets/login.js"></script>
  </head>
  <body class="login-body">
    <div class="page-glow page-glow-left"></div>
    <div class="page-glow page-glow-right"></div>

    <main class="login-shell">
      <section class="login-intro">
        <p class="eyebrow">Arxiv Everyday</p>
        <h1>把你关心的 AI 论文，变成一张更好读的每日看板。</h1>
        <p class="intro-copy">
          打开页面后选择时间窗口，点击“立即更新”，系统会抓取与你给定主题相关的 arXiv 论文，并展示英文原文与中文翻译，同时支持本地收藏。
        </p>

        <div class="feature-list">
          <div class="feature-card">
            <span class="feature-kicker">实时更新</span>
            <p>支持最近 1 / 3 / 7 / 14 / 30 天，以及自定义起止日期。</p>
          </div>
          <div class="feature-card">
            <span class="feature-kicker">双语阅读</span>
            <p>论文标题与摘要同时保留英文原文，并补充中文译文。</p>
          </div>
          <div class="feature-card">
            <span class="feature-kicker">收藏沉淀</span>
            <p>收藏结果会保存到本地数据库，刷新页面后仍可继续查看。</p>
          </div>
        </div>
      </section>

      <section class="login-panel">
        <div class="panel-badge">本地演示入口</div>
        <h2>登录继续</h2>
        <p class="panel-copy">默认账号已按你的要求预置，后续部署时也可以通过环境变量调整。</p>

        <div class="credential-box">
          <div>
            <span>账号</span>
            <strong>admin123</strong>
          </div>
          <div>
            <span>密码</span>
            <strong>admin123</strong>
          </div>
        </div>

        <form id="loginForm" class="login-form">
          <label class="field">
            <span>账号</span>
            <input id="username" name="username" type="text" autocomplete="username" placeholder="请输入账号" value="admin123" required />
          </label>

          <label class="field">
            <span>密码</span>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" value="admin123" required />
          </label>

          <button id="loginButton" type="submit" class="primary-button">进入系统</button>
          <p id="loginMessage" class="inline-message hidden"></p>
        </form>
      </section>
    </main>
  </body>
</html>
